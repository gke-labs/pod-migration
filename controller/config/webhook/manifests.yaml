# Generated from +kubebuilder:webhook:* markers in internal/webhook/*.go.
# Hand-written here for study.
#
# IMPORTANT: clientConfig.caBundle is empty here; in a real deploy cert-manager
# (or a kustomize patch from config/certmanager) injects the CA bundle so the
# API server trusts our serving cert.
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: validating-webhook-configuration
webhooks:
  - name: veviction.podmigration.gke.io
    admissionReviewVersions: ["v1"]
    sideEffects: None
    failurePolicy: Fail   # if our webhook is down, refuse evictions (safer)
    timeoutSeconds: 5
    clientConfig:
      service:
        namespace: system
        name: webhook-service
        path: /validate--v1-pod-eviction
        port: 443
      # caBundle: <injected by cert-manager>
    rules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE"]
        resources: ["pods/eviction"]
        scope: Namespaced

---
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: mutating-webhook-configuration
webhooks:
  - name: mpodgate.podmigration.gke.io
    admissionReviewVersions: ["v1"]
    sideEffects: None
    failurePolicy: Fail
    timeoutSeconds: 5
    clientConfig:
      service:
        namespace: system
        name: webhook-service
        path: /mutate-v1-pod-scheduling-gate
        port: 443
    rules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE"]
        resources: ["pods"]
        scope: Namespaced
