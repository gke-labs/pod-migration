apiVersion: node.k8s.io/v1
kind: RuntimeClass
metadata:
  name: custom-gvisor
handler: gvisor
scheduling:
  nodeSelector:
    custom-gvisor: "true"
  tolerations:
  - effect: NoSchedule
    key: sandbox.gke.io/runtime
    operator: Equal
    value: gvisor
  - effect: NoExecute
    key: custom-gvisor-taint
    operator: Equal
    value: "true"
