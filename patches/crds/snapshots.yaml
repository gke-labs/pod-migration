apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.18.0
    components.gke.io/layer: addon
  labels:
    addonmanager.kubernetes.io/mode: Reconcile
  name: podsnapshots.podsnapshot.gke.io
spec:
  group: podsnapshot.gke.io
  names:
    kind: PodSnapshot
    listKind: PodSnapshotList
    plural: podsnapshots
    shortNames:
    - ps
    singular: podsnapshot
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - description: The current state of the PodSnapshot.
      jsonPath: .status.conditions[?(@.type=="Ready")].reason
      name: Status
      type: string
    - description: The policy used for this snapshot.
      jsonPath: .spec.policyName
      name: Policy
      type: string
    - jsonPath: .metadata.labels
      name: Labels
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1
    schema:
      openAPIV3Schema:
        description: |-
          PodSnapshot represents a point-in-time snapshot of a Pod's state. It is a
          namespaced resource that is governed by a PodSnapshotPolicy.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: PodSnapshotSpec defines the desired state of a PodSnapshot.
            properties:
              policyName:
                description: |-
                  PolicyName is a name to the PodSnapshotPolicy in the same namespace
                  that governs the behavior of this snapshot.
                  This field is immutable.
                type: string
            required:
            - policyName
            type: object
          status:
            description: PodSnapshotStatus defines the observed state of a PodSnapshot.
            properties:
              conditions:
                description: |-
                  Conditions provide detailed observations of the resource's current state.
                  They are updated by the controller to reflect the progress and health
                  of the snapshot process.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              lastAccessTime:
                description: |-
                  LastAccessTime is the last time the snapshot was used to restore a pod.
                  This is updated by the restoreWorker() when a restore operation occurs.
                  It is used to determine expiration for retention policies.
                format: date-time
                type: string
              observedCheckpointRetryCount:
                description: |-
                  ObservedCheckpointRetry represents how many times we've seen current CR
                  was retried for checkpointing
                format: int64
                type: integer
              observedGeneration:
                description: |-
                  ObservedGeneration represents the .metadata.generation that the status was
                  last updated for. This is used to reconcile changes made to the spec.
                format: int64
                type: integer
              storageStatus:
                description: |-
                  StorageStatus contains details about the underlying storage resources
                  that have been provisioned for this snapshot.
                properties:
                  gcs:
                    description: GCS provides status information about the GCS resources.
                    properties:
                      observedGCSPath:
                        description: |-
                          GCS bucket path where snapshot is stored in the GCS bucket
                          Example: "gs://my-bucket/snapshot-name"
                        pattern: ^gs:\/\/[a-z0-9._-]+\/.*
                        type: string
                    type: object
                type: object
            type: object
        required:
        - spec
        type: object
    selectableFields:
    - jsonPath: .spec.policyName
    served: true
    storage: true
    subresources:
      status: {}
