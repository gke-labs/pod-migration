apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.18.0
    components.gke.io/layer: addon
    addonmanager.kubernetes.io/mode: Reconcile
  labels:
    components.gke.io/layer: addon
    addonmanager.kubernetes.io/mode: Reconcile
  name: podsnapshotpolicies.podsnapshot.gke.io
spec:
  group: podsnapshot.gke.io
  names:
    kind: PodSnapshotPolicy
    listKind: PodSnapshotPolicyList
    plural: podsnapshotpolicies
    shortNames:
    - psp
    singular: podsnapshotpolicy
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - description: The name of PodSnapshotStorageConfig used for the PodSnapshotPolicy.
      jsonPath: .spec.storageConfigName
      name: StorageConfig
      type: string
    - description: The selector used for the PodSnapshotPolicy.
      jsonPath: .spec.selector
      name: Selector
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1
    schema:
      openAPIV3Schema:
        description: PodSnapshotPolicy defines matching conditions to trigger checkpoints
          for selected workloads.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: PodSnapshotPolicySpec defines the desired state of PodSnapshotPolicy.
            properties:
              retentionConfig:
                description: RetentionConfig defines the retention policy for created
                  snapshots.
                properties:
                  lastAccessTimeout:
                    description: |-
                      LastAccessTimeout is the duration after which a PodSnapshot will be considered stale.
                      If set, the PodSnapshot will be deleted if it has not been accessed within this duration.
                      Supported units are:
                      - y: years
                      - mo: months
                      - d: days
                      - h: hours
                      - min: minutes
                      Example: "30d" means the PodSnapshot under this policy will be deleted if it has not been accessed in the last 30 days.
                      If not set, the PodSnapshot will always persist unless manually deleted.
                    pattern: ^(\d+)\s*(y|mo|d|h|min)$
                    type: string
                required:
                - lastAccessTimeout
                type: object
              selector:
                description: |-
                  Selector defines the set of pods managed by this policy. The policy's checkpoint and restore settings
                  will apply to all pods that match the policy's label selector.
                  Example:
                    selector:
                      matchLabels:
                        app.kubernetes.io/name: MyApp
                properties:
                  matchExpressions:
                    description: matchExpressions is a list of label selector requirements.
                      The requirements are ANDed.
                    items:
                      description: |-
                        A label selector requirement is a selector that contains values, a key, and an operator that
                        relates the key and values.
                      properties:
                        key:
                          description: key is the label key that the selector applies
                            to.
                          type: string
                        operator:
                          description: |-
                            operator represents a key's relationship to a set of values.
                            Valid operators are In, NotIn, Exists and DoesNotExist.
                          type: string
                        values:
                          description: |-
                            values is an array of string values. If the operator is In or NotIn,
                            the values array must be non-empty. If the operator is Exists or DoesNotExist,
                            the values array must be empty. This array is replaced during a strategic
                            merge patch.
                          items:
                            type: string
                          type: array
                          x-kubernetes-list-type: atomic
                      required:
                      - key
                      - operator
                      type: object
                    type: array
                    x-kubernetes-list-type: atomic
                  matchLabels:
                    additionalProperties:
                      type: string
                    description: |-
                      matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels
                      map is equivalent to an element of matchExpressions, whose key field is "key", the
                      operator is "In", and the values array contains only "value". The requirements are ANDed.
                    type: object
                type: object
                x-kubernetes-map-type: atomic
              snapshotGroupingRules:
                description: |-
                  SnapshotGroupingRules defines special grouping logic that can be used to further group pod snapshots under the same policy.
                  This allows restoration to select pod snapshots from a specific group rather than from all snapshots under the policy.
                properties:
                  groupByLabelValue:
                    description: GroupByLabelValue defines a grouping rule based on
                      label values.
                    properties:
                      groupRetentionPolicy:
                        description: |-
                          GroupRetentionPolicy defines the retention policy for each group.
                          Note: Group-level retention does not override the policy-level retention.
                          For example, if policy-level LastAccessTimeout is 30 days, snapshots will be
                          cleaned up after 30 days even if they satisfy the group retention policy.
                        properties:
                          maxSnapshotCountPerGroup:
                            default: 0
                            description: |-
                              MaxSnapshotCountPerGroup is the maximum number of snapshots that can be created under each group.
                              A value of 0 indicates no restriction.
                            format: int64
                            minimum: 0
                            type: integer
                        type: object
                      labels:
                        description: |-
                          Labels is a list of label keys from the source Pod used to group PodSnapshots.
                          For each label key in this list, if it exists on the source Pod, its key-value pair
                          will be added to the PodSnapshot's labels.

                          It is possible that not all label keys specified in this list will be present on a
                          Pod. In such cases, only the available labels will be added to the PodSnapshot.

                          Note: Grouping is based on the exact match of all labels extracted from this list.
                          For example, if Labels is ["key1", "key2"]:
                          1. A Pod with {key1: val1} results in a PS with {key1: val1}.
                          2. A Pod with {key1: val1, key2: val2} results in a PS with {key1: val1, key2: val2}.
                          These two PodSnapshots will belong to DIFFERENT groups because their label sets differ.

                          Best Practice: To ensure consistent grouping, use 'matchExpressions' in the
                          policy's 'selector' to guarantee all governed Pods contain the full set of labels.
                          Example:
                            selector:
                              matchExpressions:
                                - {key: tenant-id, operator: Exists}
                                - {key: corp-id, operator: Exists}

                          Example: ["tenant-id", "corp-id"]
                        items:
                          type: string
                        minItems: 1
                        type: array
                    required:
                    - labels
                    type: object
                type: object
              snapshotScope:
                default: whole-pod
                description: |-
                  SnapshotScope defines the snapshot scope. "whole-pod" scope checkpoints
                  the entire Pod including application state, application memory and
                  filesystems. "rootfs-only" checkpoints only the container root
                  filesystems.
                enum:
                - whole-pod
                - rootfs-only
                type: string
              storageConfigName:
                description: Name of the PodSnapshotStorageConfig this policy depends
                  on.
                type: string
              triggerConfig:
                description: Configuration for checkpoint triggers.
                properties:
                  postCheckpoint:
                    default: resume
                    description: |-
                      PostCheckpoint defines pod behavior after a checkpoint is taken.
                      `stop`: the pod turns to completed status after the checkpoint is taken.
                      `resume`: workload will resume after being checkpointed.
                    enum:
                    - stop
                    - resume
                    type: string
                  type:
                    description: |-
                      Type of checkpoint trigger.
                      `readinessProbe`: checkpoint will be triggered externally when the pod turns ready.
                      `workload`: checkpoint will be triggered by the workload container itself.
                      `manual`: policy will not generate any checkpoint but wait for PodSnapshotTrigger to be created.
                    enum:
                    - readinessProbe
                    - workload
                    - manual
                    - onDelete
                    type: string
                required:
                - type
                type: object
            required:
            - selector
            - storageConfigName
            - triggerConfig
            type: object
          status:
            description: PodSnapshotPolicyStatus defines the observed state of PodSnapshotPolicy.
            properties:
              conditions:
                description: Represents the latest available observations of a PodSnapshotPolicy's
                  current state.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              observedGeneration:
                description: ObservedGeneration is the most recent generation observed
                  by the controller.
                format: int64
                type: integer
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
