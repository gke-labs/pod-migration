apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: pm-etcd
  namespace: default
spec:
  serviceName: pm-etcd-service
  replicas: 1
  selector:
    matchLabels:
      app: pm-etcd
  template:
    metadata:
      labels:
        app: pm-etcd
        live-migration.gke.io/enabled: "true"
        pod-migration.gke.io/enabled: "true"
    spec:
      serviceAccountName: pm-test-ksa
      runtimeClassName: gvisor
      nodeSelector:
        sandbox.gke.io/runtime: gvisor
      tolerations:
        - key: sandbox.gke.io/runtime
          operator: Equal
          value: gvisor
          effect: NoSchedule
      containers:
        - name: etcd
          image: quay.io/coreos/etcd:v3.5.13
          imagePullPolicy: IfNotPresent
          command:
            - "/usr/local/bin/etcd"
          args:
            - "--name"
            - "m"
            - "--data-dir"
            - "/tmp/etcd"
            - "--listen-client-urls"
            - "http://0.0.0.0:2379"
            - "--advertise-client-urls"
            - "http://127.0.0.1:2379"
            - "--listen-peer-urls"
            - "http://0.0.0.0:2380"
            - "--initial-advertise-peer-urls"
            - "http://127.0.0.1:2380"
            - "--initial-cluster"
            - "m=http://127.0.0.1:2380"
            - "--initial-cluster-state"
            - "new"
          env:
            - { name: ALLOW_NONE_AUTHENTICATION, value: "yes" }
            - { name: ETCDCTL_API, value: "3" }
          ports: [{ containerPort: 2379 }]
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits: { memory: 512Mi }
          readinessProbe:
            tcpSocket: { port: 2379 }
            periodSeconds: 2
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: pm-etcd-service
  namespace: default
spec:
  selector:
    app: pm-etcd
  ports:
    - port: 2379
      targetPort: 2379
