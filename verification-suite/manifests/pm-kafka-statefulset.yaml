apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: pm-kafka
  namespace: default
spec:
  serviceName: pm-kafka-service
  replicas: 1
  selector:
    matchLabels:
      app: pm-kafka
  template:
    metadata:
      labels:
        app: pm-kafka
        live-migration.gke.io/enabled: "true"
        pod-migration.gke.io/enabled: "true"
    spec:
      serviceAccountName: pm-test-ksa
      runtimeClassName: gvisor
      nodeSelector:
        sandbox.gke.io/runtime: gvisor
      tolerations:
        - key: sandbox.gke.io/runtime
          operator: Equal
          value: gvisor
          effect: NoSchedule
      containers:
        - name: kafka
          image: apache/kafka:3.7.0
          imagePullPolicy: IfNotPresent
          env:
            - { name: GODEBUG, value: multipathtcp=0 }
            - { name: KAFKA_OPTS, value: "-XX:-UseContainerSupport" }
            - { name: KAFKA_ADVERTISED_LISTENERS, value: "PLAINTEXT://localhost:9092" }
            - { name: KAFKA_CONTROLLER_LISTENER_NAMES, value: "CONTROLLER" }
            - { name: KAFKA_CONTROLLER_QUORUM_VOTERS, value: "1@localhost:9093" }
            - { name: KAFKA_LISTENERS, value: "PLAINTEXT://:9092,CONTROLLER://:9093" }
            - { name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP, value: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT" }
            - { name: KAFKA_NODE_ID, value: "1" }
            - { name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR, value: "1" }
            - { name: KAFKA_PROCESS_ROLES, value: "broker,controller" }
          ports: [{ containerPort: 9092 }]
          resources:
            requests: { cpu: 100m, memory: 1280Mi }
            limits: { memory: 2560Mi }
          readinessProbe:
            tcpSocket: { port: 9092 }
            periodSeconds: 2
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: pm-kafka-service
  namespace: default
spec:
  selector:
    app: pm-kafka
  ports:
    - port: 9092
      targetPort: 9092
