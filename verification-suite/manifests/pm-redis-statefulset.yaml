apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: pm-redis
  namespace: default
spec:
  serviceName: pm-redis-service
  replicas: 1
  selector:
    matchLabels:
      app: pm-redis
  template:
    metadata:
      labels:
        app: pm-redis
        live-migration.gke.io/enabled: "true"
        pod-migration.gke.io/enabled: "true"
    spec:
      serviceAccountName: pm-test-ksa
      runtimeClassName: gvisor
      nodeSelector:
        sandbox.gke.io/runtime: gvisor
      tolerations:
        - key: sandbox.gke.io/runtime
          operator: Equal
          value: gvisor
          effect: NoSchedule
      containers:
        - name: redis
          image: redis:7-alpine
          imagePullPolicy: IfNotPresent
          ports: [{ containerPort: 6379 }]
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits: { memory: 512Mi }
          readinessProbe:
            tcpSocket: { port: 6379 }
            periodSeconds: 2
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: pm-redis-service
  namespace: default
spec:
  selector:
    app: pm-redis
  ports:
    - port: 6379
      targetPort: 6379
