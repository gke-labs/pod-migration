apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: pm-consul
  namespace: default
spec:
  serviceName: pm-consul-service
  replicas: 1
  selector:
    matchLabels:
      app: pm-consul
  template:
    metadata:
      labels:
        app: pm-consul
        live-migration.gke.io/enabled: "true"
        pod-migration.gke.io/enabled: "true"
    spec:
      serviceAccountName: pm-test-ksa
      runtimeClassName: gvisor
      nodeSelector:
        sandbox.gke.io/runtime: gvisor
      tolerations:
        - key: sandbox.gke.io/runtime
          operator: Equal
          value: gvisor
          effect: NoSchedule
      containers:
        - name: consul
          image: hashicorp/consul:1.18
          imagePullPolicy: IfNotPresent
          args:
            - "agent"
            - "-dev"
            - "-client"
            - "0.0.0.0"
          ports: [{ containerPort: 8500 }]
          resources:
            requests: { cpu: 50m, memory: 256Mi }
            limits: { memory: 512Mi }
          readinessProbe:
            tcpSocket: { port: 8500 }
            periodSeconds: 2
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: pm-consul-service
  namespace: default
spec:
  selector:
    app: pm-consul
  ports:
    - port: 8500
      targetPort: 8500
