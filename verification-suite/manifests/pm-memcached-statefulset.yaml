apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: pm-memcached
  namespace: default
spec:
  serviceName: pm-memcached-service
  replicas: 1
  selector:
    matchLabels:
      app: pm-memcached
  template:
    metadata:
      labels:
        app: pm-memcached
        live-migration.gke.io/enabled: "true"
        pod-migration.gke.io/enabled: "true"
    spec:
      serviceAccountName: pm-test-ksa
      runtimeClassName: gvisor
      nodeSelector:
        sandbox.gke.io/runtime: gvisor
      tolerations:
        - key: sandbox.gke.io/runtime
          operator: Equal
          value: gvisor
          effect: NoSchedule
      containers:
        - name: memcached
          image: memcached:1.6-alpine
          imagePullPolicy: IfNotPresent
          args:
            - "-m"
            - "64"
          ports: [{ containerPort: 11211 }]
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits: { memory: 512Mi }
          readinessProbe:
            tcpSocket: { port: 11211 }
            periodSeconds: 2
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: pm-memcached-service
  namespace: default
spec:
  selector:
    app: pm-memcached
  ports:
    - port: 11211
      targetPort: 11211
