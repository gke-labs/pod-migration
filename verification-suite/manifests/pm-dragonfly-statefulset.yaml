apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: pm-dragonfly
  namespace: default
spec:
  serviceName: pm-dragonfly-service
  replicas: 1
  selector:
    matchLabels:
      app: pm-dragonfly
  template:
    metadata:
      labels:
        app: pm-dragonfly
        live-migration.gke.io/enabled: "true"
        pod-migration.gke.io/enabled: "true"
    spec:
      serviceAccountName: pm-test-ksa
      runtimeClassName: gvisor
      nodeSelector:
        sandbox.gke.io/runtime: gvisor
      tolerations:
        - key: sandbox.gke.io/runtime
          operator: Equal
          value: gvisor
          effect: NoSchedule
      containers:
        - name: dragonfly
          image: docker.dragonflydb.io/dragonflydb/dragonfly:v1.21.2
          imagePullPolicy: IfNotPresent
          args:
            - "--force_epoll"
            - "--bind"
            - "0.0.0.0"
            - "--proactor_threads=2"
          ports: [{ containerPort: 6379 }]
          resources:
            requests: { cpu: 100m, memory: 512Mi }
            limits: { memory: 1Gi }
          readinessProbe:
            tcpSocket: { port: 6379 }
            periodSeconds: 2
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: pm-dragonfly-service
  namespace: default
spec:
  selector:
    app: pm-dragonfly
  ports:
    - port: 6379
      targetPort: 6379
