apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: pm-mysql
  namespace: default
spec:
  serviceName: pm-mysql-service
  replicas: 1
  selector:
    matchLabels:
      app: pm-mysql
  template:
    metadata:
      labels:
        app: pm-mysql
        live-migration.gke.io/enabled: "true"
        pod-migration.gke.io/enabled: "true"
    spec:
      securityContext:
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
      serviceAccountName: pm-test-ksa
      runtimeClassName: gvisor
      nodeSelector:
        sandbox.gke.io/runtime: gvisor
      tolerations:
        - key: sandbox.gke.io/runtime
          operator: Equal
          value: gvisor
          effect: NoSchedule
      containers:
        - name: mysql
          image: mysql:8
          imagePullPolicy: IfNotPresent
          command:
            - "sh"
            - "-c"
            - "mkdir -p /tmp/mysql && mysqld --initialize-insecure --datadir=/tmp/mysql --innodb_use_native_aio=OFF && exec mysqld --datadir=/tmp/mysql --innodb_use_native_aio=OFF"
          env:
            - { name: GODEBUG, value: multipathtcp=0 }
            - { name: MYSQL_ALLOW_EMPTY_PASSWORD, value: "1" }
          ports: [{ containerPort: 3306 }]
          resources:
            requests: { cpu: 50m, memory: 512Mi }
            limits: { memory: 1024Mi }
          readinessProbe:
            tcpSocket: { port: 3306 }
            periodSeconds: 2
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: pm-mysql-service
  namespace: default
spec:
  selector:
    app: pm-mysql
  ports:
    - port: 3306
      targetPort: 3306
