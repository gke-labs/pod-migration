apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: pm-vault
  namespace: default
spec:
  serviceName: pm-vault-service
  replicas: 1
  selector:
    matchLabels:
      app: pm-vault
  template:
    metadata:
      labels:
        app: pm-vault
        live-migration.gke.io/enabled: "true"
        pod-migration.gke.io/enabled: "true"
    spec:
      serviceAccountName: pm-test-ksa
      runtimeClassName: gvisor
      nodeSelector:
        sandbox.gke.io/runtime: gvisor
      tolerations:
        - key: sandbox.gke.io/runtime
          operator: Equal
          value: gvisor
          effect: NoSchedule
      containers:
        - name: vault
          image: hashicorp/vault:1.16
          imagePullPolicy: IfNotPresent
          args:
            - "server"
            - "-dev"
            - "-dev-listen-address"
            - "0.0.0.0:8200"
          env:
            - { name: VAULT_ADDR, value: "http://127.0.0.1:8200" }
            - { name: VAULT_DEV_ROOT_TOKEN_ID, value: "root" }
            - { name: VAULT_TOKEN, value: "root" }
          ports: [{ containerPort: 8200 }]
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits: { memory: 512Mi }
          readinessProbe:
            tcpSocket: { port: 8200 }
            periodSeconds: 2
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: pm-vault-service
  namespace: default
spec:
  selector:
    app: pm-vault
  ports:
    - port: 8200
      targetPort: 8200
