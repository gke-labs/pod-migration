apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: pm-zookeeper
  namespace: default
spec:
  serviceName: pm-zookeeper-service
  replicas: 1
  selector:
    matchLabels:
      app: pm-zookeeper
  template:
    metadata:
      labels:
        app: pm-zookeeper
        live-migration.gke.io/enabled: "true"
        pod-migration.gke.io/enabled: "true"
    spec:
      serviceAccountName: pm-test-ksa
      runtimeClassName: gvisor
      nodeSelector:
        sandbox.gke.io/runtime: gvisor
      tolerations:
        - key: sandbox.gke.io/runtime
          operator: Equal
          value: gvisor
          effect: NoSchedule
      containers:
        - name: zookeeper
          image: zookeeper:3.9
          imagePullPolicy: IfNotPresent
          command:
            - "sh"
            - "-c"
            - "mkdir -p /tmp/zookeeper/data /tmp/zookeeper/datalog && exec /docker-entrypoint.sh zkServer.sh start-foreground"
          env:
            - { name: GODEBUG, value: multipathtcp=0 }
            - { name: ZOO_DATA_DIR, value: "/tmp/zookeeper/data" }
            - { name: ZOO_DATA_LOG_DIR, value: "/tmp/zookeeper/datalog" }
          ports: [{ containerPort: 2181 }]
          resources:
            requests: { cpu: 100m, memory: 512Mi }
            limits: { memory: 1024Mi }
          readinessProbe:
            tcpSocket: { port: 2181 }
            periodSeconds: 2
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: pm-zookeeper-service
  namespace: default
spec:
  selector:
    app: pm-zookeeper
  ports:
    - port: 2181
      targetPort: 2181
